# Build and deploy Vite (React) site to GitHub Pages
#
# Branch "X" not allowed to deploy to github-pages?
#   Repo → Settings → Environments → github-pages → "Deployment branches and tags"
#   → choose "All branches", or "Selected branches" and add patterns (e.g. main, dev).
#
name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Opt Actions (checkout, setup-node, etc.) into Node 24 runtime; see GitHub changelog 2025-09-19.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
